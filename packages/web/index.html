<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#e2b24e" />
    <title>Notary - trustless escrow on Unicity</title>
    <meta name="description" content="Hire @notary, an autonomous escrow & arbitration agent on the Unicity network. 1% fee, no accounts, your keys stay in your browser." />
    <meta name="application-name" content="Notary" />
    <meta name="category" content="DeFi" />
    <meta name="theme-color" content="#0e0e12" />
    <meta name="author" content="Notary" />

    <!-- Open Graph — per-page title/description/url are refreshed at runtime (see lib/meta.ts) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Notary" />
    <meta property="og:title" content="Notary - trustless escrow on Unicity" />
    <meta property="og:description" content="Hire @notary, an autonomous escrow & arbitration agent on the Unicity network. 1% fee, no accounts, your keys stay in your browser." />
    <meta property="og:image" content="/og-banner.svg" />
    <meta property="og:image:alt" content="Notary — trustless escrow & arbitration on Unicity" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:logo" content="/favicon.svg" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Notary - trustless escrow on Unicity" />
    <meta name="twitter:description" content="Hire @notary, an autonomous escrow & arbitration agent on the Unicity network. 1% fee, no accounts, your keys stay in your browser." />
    <meta name="twitter:image" content="/og-banner.svg" />
    <meta name="twitter:image:alt" content="Notary — trustless escrow & arbitration on Unicity" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Apply the persisted (or system) theme before first paint — no flash.
      (function () {
        try {
          var t = localStorage.getItem('notary-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
